# .github/workflows/deploy.yml
# CS178 Auto-Deploy Workflow
# --------------------------
# Automatically deploys your Flask app to EC2 whenever you push to main.
#
# Before this works, you must add three secrets to your GitHub repo:
#   Settings → Secrets and variables → Actions → New repository secret
#
#   EC2_HOST        → Your EC2 Public IPv4 DNS
#                     (looks like ec2-XX-XX-XX-XX.compute-1.amazonaws.com)
#   EC2_USER        → ec2-user
#   EC2_PRIVATE_KEY → The contents of your deploy_key (from Lab 9 setup)
#
# If you're starting fresh (new fork), re-do the deploy key setup from Lab 9.

name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        env:
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=60 \
              $USER@$HOST bash -s << 'REMOTE'
          cd ~/cs178-flask-app
          git pull origin main
          pkill -f "python3 flaskapp.py" || true
          sleep 2
          nohup python3 flaskapp.py > flask.log 2>&1 &
          sleep 1
          echo "Deploy complete. Flask restarted."
          REMOTE